version: '3.9'

services:

  app1:
    build: .
    container_name: flask_app_1
    restart: unless-stopped
    ports:
      - "5000:5000"

    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 5000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URI: mysql+pymysql://root:root123@mysql:3306/palindrome_db

    depends_on:
      - mysql
      - redis

  app2:
    build: .
    container_name: flask_app_2
    restart: unless-stopped

    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 5000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URI: mysql+pymysql://root:root123@mysql:3306/palindrome_db

    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    container_name: mysql_container
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: palindrome_db

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:latest
    container_name: redis_container
    restart: unless-stopped

    ports:
      - "6379:6379"

volumes:
  mysql_data:
